name: hermes-zyte-scraper
version: "1.1.0"
description: |
  Production-grade Zyte integration for Hermes.
  
  Features:
  - Resilient multi-page extraction with tenacity retries (zyte_extract)
  - Powerful natural language → full Scrapy spider generation (zyte_build_spider)
  - Full operational tools for Scrapy Cloud (deploy, schedule, results)
  
  Battle-tested architecture with clean separation of concerns.
author: "Hermes + DeepSpace"
provides_tools:
  - zyte_extract
  - zyte_build_spider
  - zyte_deploy
  - zyte_list_jobs
  - zyte_get_results
  - zyte_schedule
requires_env:
  - name: ZYTE_API_KEY
    description: "Zyte API key"
    secret: true
  - name: SCRAPY_CLOUD_API_KEY
    description: "Scrapy Cloud API key"
    secret: true
kind: standalone
tags: [zyte, scraping, spider, production, tenacity, battle-tested]