name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest tests.test_tools -v

  battle-matrix-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate battle matrix artifact exists
        run: |
          test -f tests/fixtures/battle_matrix_expected.json
          python -c "import json; json.load(open('tests/fixtures/battle_matrix_expected.json'))"